<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pathfinder Communication Relay</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- NEW: Boot screen to bypass browser audio-blocking -->
    <div id="boot-screen" onclick="bootSystem()">
        <p>INCOMING TRANSMISSION...</p>
        <p class="blink">[ TAP TO INITIALIZE ]</p>
    </div>

    <!-- Empty for the Typewriter effect -->
    <h2 id="sol-title"></h2>

    <div id="ui-container">
       <div id="mars-base">
        <div id="dial-rim"></div>
        
        <!-- STATIC LANDER (Underneath the camera) -->
        <img src="images/pathfinder_lander_base.png" id="lander-base" alt="Pathfinder Lander">
    
        <div id="rover-anchor">
            <!-- CUSTOM CAMERA IMAGE -->
            <img src="images/rover_camera_top.png" id="camera-sprite" alt="Camera"> 
        </div>
        <div id="ring"></div>
    </div>

        <div class="controls">
            <button id="btn-1" onclick="playSequence('msg1')">RECEIVE MESSAGE 1</button>
            <button id="btn-2" onclick="playSequence('msg2')">RECEIVE MESSAGE 2</button>
            <button id="btn-3" onclick="playSequence('msg3')">RECEIVE MESSAGE 3</button>
        </div>

        <div id="status-container">
            <p id="status">STANDING BY...</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
