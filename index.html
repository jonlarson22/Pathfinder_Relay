<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pathfinder Telemetry Override</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- NEW: Boot screen to bypass browser audio-blocking -->
    <div id="boot-screen" onclick="bootSystem()">
        <p>CARRIER SIGNAL DETECTED...</p>
        <p class="blink">[ INITIALIZE DOWNLINK ]</p>
    </div>

    <!-- Empty for the Typewriter effect -->
    <h2 id="sol-title"></h2>

    <div id="ui-container">
       <div id="mars-base">
        <div id="dial-rim"></div>
        
        <!-- STATIC LANDER (Underneath the camera) -->
        <img src="images/pathfinder_base_ortho.png" id="lander-base" alt="Pathfinder Lander">
    
        <div id="rover-anchor">
            <!-- CUSTOM CAMERA IMAGE -->
            <img src="images/camera_ortho_sprite.png" id="camera-sprite" alt="Camera"> 
        </div>
        <div id="ring"></div>
    </div>

       <div id="control-panel">
            <div class="controls">
                <button id="btn-1" onclick="playSequence('msg1')">FETCH DATA BLOCK: 01</button>
                <button id="btn-2" onclick="playSequence('msg2')">FETCH DATA BLOCK: 02</button>
                <button id="btn-3" onclick="playSequence('msg3')">FETCH DATA BLOCK: 03</button>
            </div>

            <div id="status-container">
                <p id="status">DOWNLINK IDLE<br>AWAITING COMMAND</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
